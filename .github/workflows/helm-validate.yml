name: helm-validate

# Validate the ArcadeDB chart: helm lint + render + kubeconform (schema) +
# Trivy chart scan. Same as `make helm-lint kubeconform`.

on:
  pull_request:
    paths:
      - "helm/**"
      - ".github/workflows/helm-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-render-conform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: helm lint
        run: helm lint helm/arcadedb

      - name: Setup kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz && sudo mv kubeconform /usr/local/bin/

      - name: render + kubeconform (default values)
        run: |
          helm template arcadedb helm/arcadedb \
            | kubeconform -strict -ignore-missing-schemas -summary

      - name: render + kubeconform (single-node + backup + podmonitor)
        run: |
          helm template arcadedb helm/arcadedb \
            --set replicaCount=1 --set cellId=kb-eu-dev-std-01 \
            --set backup.enabled=true --set backup.bucket=kb-backups-eu-dev \
            --set metrics.podMonitor.enabled=true \
            | kubeconform -strict -ignore-missing-schemas -summary

      - name: Trivy chart config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: helm/arcadedb
          severity: HIGH,CRITICAL
          exit-code: "1"
